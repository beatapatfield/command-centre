<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d9aae">
<title>Command Centre</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Command">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --turq-1: #0d9aae;
    --turq-2: #2fd0d8;
    --turq-3: #62e6df;
    --yellow-1: #fde047;
    --yellow-2: #facc15;
    --ink: #08363c;
    --muted: #5a8189;
    --line: rgba(13, 154, 174, 0.16);
    --card: rgba(255, 255, 255, 0.72);
    --card-solid: #ffffff;
    --danger: #dc2626;
    --radius: 22px;
    --shadow-sm: 0 1px 2px rgba(10, 90, 100, 0.06);
    --shadow-md: 0 8px 30px rgba(10, 90, 100, 0.10);
    --shadow-lg: 0 20px 50px rgba(10, 90, 100, 0.16);
    --grad: linear-gradient(120deg, var(--turq-1) 0%, var(--turq-2) 46%, var(--yellow-2) 100%);
    --grad-soft: linear-gradient(120deg, #0d9aae15 0%, #2fd0d812 46%, #facc1518 100%);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    line-height: 1.5;
    min-height: 100%;
    background:
      radial-gradient(1200px 600px at 8% -5%, rgba(47,208,216,0.30), transparent 60%),
      radial-gradient(1000px 700px at 105% 0%, rgba(250,204,21,0.30), transparent 55%),
      radial-gradient(900px 800px at 50% 120%, rgba(13,154,174,0.16), transparent 60%),
      #eefcfb;
    background-attachment: fixed;
  }

  /* ---------- Header ---------- */
  header {
    max-width: 1120px;
    margin: 0 auto;
    padding: 34px clamp(18px, 4vw, 40px) 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .back {
    width: 40px; height: 40px; flex-shrink: 0;
    border-radius: 12px;
    display: grid; place-items: center;
    background: var(--card); border: 1px solid var(--line);
    color: var(--turq-1); box-shadow: var(--shadow-sm);
    text-decoration: none;
    transition: transform .12s, box-shadow .12s;
  }
  .back:hover { transform: translateX(-2px); box-shadow: var(--shadow-md); }
  .back svg { width: 20px; height: 20px; }
  .logo {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: var(--grad);
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-md);
    flex-shrink: 0;
    text-decoration: none;
  }
  .logo svg { width: 24px; height: 24px; }
  .brand h1 {
    font-size: clamp(22px, 3.5vw, 30px);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin: 0;
    line-height: 1.05;
    background: linear-gradient(100deg, var(--turq-1), #087f90);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .brand p { margin: 2px 0 0; font-size: 13px; color: var(--muted); font-weight: 500; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--line);
    background: var(--card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    padding: 10px 16px;
    border-radius: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    box-shadow: var(--shadow-sm);
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn:active { transform: translateY(0); }
  .btn svg { width: 16px; height: 16px; }
  .btn.primary {
    background: var(--grad);
    color: #05343a;
    border: none;
    font-weight: 700;
  }
  .btn.primary:hover { box-shadow: var(--shadow-lg); }

  /* ---------- Layout ---------- */
  main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 18px clamp(18px, 4vw, 40px) 30px;
  }

  /* view routing */
  .view { display: none; animation: fade .25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  #view-home.active {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: start;
    padding-top: 12px;
  }
  @media (max-width: 800px) { #view-home.active { grid-template-columns: 1fr; } }
  .view.feature .panel { max-width: 720px; margin: 0 auto; }

  /* home tiles */
  .tile {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 28px;
    min-height: 200px;
    border-radius: var(--radius);
    background: var(--card);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: var(--shadow-lg);
    text-decoration: none;
    color: var(--ink);
    position: relative;
    overflow: hidden;
    transition: transform .16s ease, box-shadow .16s ease;
  }
  .tile::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 4px; background: var(--grad); }
  .tile:hover { transform: translateY(-4px); box-shadow: 0 28px 60px rgba(10,90,100,0.22); }
  .tile-icon {
    width: 58px; height: 58px; border-radius: 16px;
    background: var(--grad); display: grid; place-items: center;
    box-shadow: var(--shadow-md);
  }
  .tile-icon svg { width: 28px; height: 28px; }
  .tile-text { margin-top: auto; }
  .tile-text h3 { margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -0.02em; }
  .tile-sub { margin: 4px 0 0; font-size: 14px; color: var(--muted); font-weight: 500; }
  .tile-go {
    position: absolute; right: 22px; bottom: 24px;
    width: 34px; height: 34px; border-radius: 50%;
    display: grid; place-items: center;
    background: rgba(13,154,174,0.10); color: var(--turq-1);
    transition: background .16s, transform .16s;
  }
  .tile-go svg { width: 18px; height: 18px; }
  .tile:hover .tile-go { background: var(--grad); color: #05343a; transform: translateX(3px); }

  .panel {
    background: var(--card);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 24px;
    display: flex;
    flex-direction: column;
    min-height: 260px;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 4px;
    background: var(--grad);
  }

  .panel-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .panel-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    display: grid; place-items: center;
    background: var(--grad-soft);
    color: var(--turq-1);
    flex-shrink: 0;
  }
  .panel-icon svg { width: 20px; height: 20px; }
  .panel-head h2 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .count {
    margin-left: auto;
    font-size: 13px;
    font-weight: 700;
    color: var(--turq-1);
    background: rgba(13,154,174,0.10);
    padding: 4px 11px;
    border-radius: 999px;
  }

  .progress {
    height: 6px;
    border-radius: 999px;
    background: rgba(13,154,174,0.12);
    overflow: hidden;
    margin: 16px 0 6px;
  }
  .progress > i {
    display: block; height: 100%; width: 0;
    border-radius: 999px;
    background: var(--grad);
    transition: width .35s cubic-bezier(.4,0,.2,1);
  }
  .progress-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }

  /* ---------- Add form ---------- */
  form.add { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 6px; }
  .field {
    flex: 1 1 150px;
    min-width: 0;
    display: flex;
    align-items: center;
    background: var(--card-solid);
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 0 12px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .field:focus-within { border-color: var(--turq-2); box-shadow: 0 0 0 3px rgba(47,208,216,0.20); }
  .field input, .field select {
    border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 14.5px; color: var(--ink);
    padding: 11px 4px; width: 100%;
  }
  .field select { cursor: pointer; }
  .field.due { flex: 0 1 200px; }
  .field.cat { flex: 0 1 160px; }
  .field.qty { flex: 0 1 110px; }
  .field svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
  form.add .btn.primary { padding: 0 18px; }

  /* ---------- To-do list ---------- */
  ul { list-style: none; margin: 6px 0 0; padding: 0; flex: 1; }
  li.item {
    display: flex; align-items: flex-start; gap: 13px;
    padding: 13px 12px; margin: 8px 0;
    background: var(--card-solid);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    animation: pop .28s cubic-bezier(.34,1.56,.64,1);
    transition: opacity .2s, transform .2s;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px) scale(.98); } to { opacity: 1; transform: none; } }

  .check {
    appearance: none; -webkit-appearance: none;
    width: 22px; height: 22px; margin-top: 1px;
    border: 2px solid var(--turq-2);
    border-radius: 8px; cursor: pointer;
    display: grid; place-items: center; flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .check:checked { background: var(--grad); border-color: transparent; }
  .check:checked::after {
    content: ""; width: 6px; height: 11px;
    border: solid #05343a; border-width: 0 2.5px 2.5px 0;
    transform: rotate(42deg) translate(-0.5px,-1px);
  }
  .item-body { flex: 1; min-width: 0; }
  .item-text { word-break: break-word; font-size: 15px; font-weight: 500; }
  .item-meta {
    font-size: 12.5px; color: var(--muted); margin-top: 3px;
    display: inline-flex; align-items: center; gap: 5px; font-weight: 500;
  }
  .item-meta svg { width: 13px; height: 13px; }
  .pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(13,154,174,0.10); color: var(--turq-1); }
  .pill.overdue { background: rgba(220,38,38,0.10); color: var(--danger); }
  .pill.soon { background: rgba(250,204,21,0.22); color: #8a6d00; }
  li.done { opacity: .6; }
  li.done .item-text { text-decoration: line-through; color: var(--muted); }

  .del {
    border: none; background: transparent; color: var(--muted);
    padding: 5px; border-radius: 9px; cursor: pointer; line-height: 0; flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .del svg { width: 17px; height: 17px; }
  .del:hover { background: rgba(220,38,38,0.10); color: var(--danger); }

  .empty { text-align: center; padding: 30px 12px; color: var(--muted); }
  .empty svg { width: 40px; height: 40px; opacity: .4; margin-bottom: 8px; }
  .empty p { margin: 0; font-size: 14px; }

  .list-sec { margin: 14px 0 2px; }
  .list-sec:first-child { margin-top: 6px; }
  .sec-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--turq-1); margin: 0 2px 4px;
  }
  .sec-title .bar { flex: 1; height: 1px; background: var(--line); }
  .sec-title .n { color: var(--muted); font-weight: 600; letter-spacing: 0; }
  .sec-title.overdue { color: var(--danger); }
  .sec-title.today { color: #8a6d00; }
  .sec-title.muted { color: var(--muted); }

  .clear-done {
    margin-top: 12px; align-self: flex-start;
    font-size: 13px; font-weight: 600; color: var(--muted);
    background: transparent; border: none; cursor: pointer; padding: 4px 2px;
  }
  .clear-done:hover { color: var(--danger); }

  /* ---------- Shopping catalog ---------- */
  li.section { margin: 16px 0 2px; }
  li.section:first-child { margin-top: 10px; }
  .section-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    padding: 9px 12px; border-radius: 12px;
  }
  .section-head svg { width: 15px; height: 15px; }
  .section-head .sh-n {
    margin-left: auto; font-size: 12px; font-weight: 700; letter-spacing: 0;
    padding: 2px 9px; border-radius: 999px;
  }
  .section-head.ready { background: var(--grad-soft); color: var(--turq-1); }
  .section-head.ready .sh-n { background: rgba(13,154,174,0.14); color: var(--turq-1); }
  .section-head.rest { color: var(--muted); padding: 4px 12px; }
  .section-head.rest .sh-n { background: rgba(90,129,137,0.12); color: var(--muted); }
  .cat-group { margin-top: 14px; }
  .cat-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--turq-1); margin: 0 2px 4px;
  }
  .cat-title .bar { flex: 1; height: 1px; background: var(--line); }
  .cat-title .n { color: var(--muted); font-weight: 600; letter-spacing: 0; text-transform: none; }

  li.cat-item {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    padding: 11px 13px; margin: 6px 0;
    background: var(--card-solid);
    border: 1px solid var(--line);
    border-radius: 13px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  li.cat-item.needed {
    border-color: rgba(13,154,174,0.45);
    box-shadow: 0 0 0 2px rgba(47,208,216,0.14), var(--shadow-sm);
    background: linear-gradient(120deg, rgba(47,208,216,0.06), rgba(250,204,21,0.05));
  }
  .cat-item .name {
    flex: 1; min-width: 0; font-size: 15px; font-weight: 500;
    color: var(--muted); cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 8px;
    transition: color .15s;
  }
  li.cat-item.needed .name { color: var(--ink); font-weight: 600; }
  .cat-item .name .nm { flex-shrink: 1; }
  .qty-tag {
    font-size: 12px; font-weight: 700; color: var(--turq-1);
    background: rgba(13,154,174,0.12); border: 1px solid rgba(13,154,174,0.25);
    padding: 1px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
  }
  li.cat-item.needed .qty-tag { background: rgba(13,154,174,0.16); }
  .cat-item .name .chev {
    width: 15px; height: 15px; color: var(--muted); flex-shrink: 0;
    margin-left: auto;
    transition: transform .2s; opacity: .55;
  }
  li.cat-item.open .name .chev { transform: rotate(180deg); }

  .detail {
    flex-basis: 100%; display: none;
    padding: 10px 2px 2px; border-top: 1px dashed var(--line); margin-top: 4px;
  }
  li.cat-item.open .detail { display: block; animation: pop .2s ease; }
  .detail .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .detail label { font-size: 12px; font-weight: 600; color: var(--muted); }
  .detail .brand-input {
    flex: 1 1 160px; min-width: 0;
    border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 11px; font-family: inherit; font-size: 14px; color: var(--ink);
    background: var(--card-solid); outline: none;
  }
  .detail .brand-input:focus { border-color: var(--turq-2); box-shadow: 0 0 0 3px rgba(47,208,216,0.18); }
  .detail .cat-tag { font-size: 12px; color: var(--muted); }
  .remove-perm {
    border: 1px solid rgba(220,38,38,0.3); background: rgba(220,38,38,0.06);
    color: var(--danger); font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 8px 12px; border-radius: 10px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .remove-perm svg { width: 14px; height: 14px; }
  .remove-perm:hover { background: rgba(220,38,38,0.12); }

  footer {
    max-width: 1120px; margin: 0 auto; text-align: center;
    color: var(--muted); font-size: 12.5px; padding: 8px 20px 34px;
  }
  #fileInput { display: none; }

  #toast {
    position: fixed; left: 50%; bottom: 26px;
    transform: translate(-50%, 20px);
    background: var(--ink); color: #eefcfb;
    font-size: 14px; font-weight: 600;
    padding: 12px 18px; border-radius: 14px;
    box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none; z-index: 50;
    transition: opacity .25s ease, transform .25s ease;
    border-left: 4px solid var(--turq-2);
    display: flex; align-items: center; gap: 14px; max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .toast-action {
    background: transparent; border: none; cursor: pointer;
    color: var(--turq-3); font-family: inherit; font-size: 14px; font-weight: 800;
    padding: 2px 4px; white-space: nowrap;
  }
  .toast-action:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <a class="back" id="backBtn" href="#home" title="Back to home" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
    </a>
    <a class="logo" href="#home" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="#05343a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"></path>
      </svg>
    </a>
    <div>
      <h1>Command Centre</h1>
      <p id="brandSub">Your day at a glance</p>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn primary" id="installBtn" title="Install app" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="M7 10l5 5 5-5"></path><path d="M5 21h14"></path></svg>
      Install
    </button>
    <button class="btn" id="exportBtn" title="Download a backup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
      Export
    </button>
    <button class="btn" id="importBtn" title="Restore from a backup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 9l5-5 5 5"></path><path d="M12 4v12"></path></svg>
      Import
    </button>
    <input type="file" id="fileInput" accept="application/json,.json">
  </div>
</header>

<main>
  <!-- Home -->
  <section class="view home" id="view-home">
    <a class="tile" href="#todo">
      <span class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#05343a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"></rect><path d="M16 2v4M8 2v4M3 10h18"></path><path d="M9 16l2 2 4-4"></path></svg>
      </span>
      <div class="tile-text">
        <h3>To-Do &amp; Schedule</h3>
        <p class="tile-sub" id="homeTodoSub">Nothing scheduled</p>
      </div>
      <span class="tile-go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg></span>
    </a>
    <a class="tile" href="#shop">
      <span class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#05343a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2 3h3l2.6 13.4a2 2 0 0 0 2 1.6h8a2 2 0 0 0 2-1.6L23 6H6"></path></svg>
      </span>
      <div class="tile-text">
        <h3>Shopping List</h3>
        <p class="tile-sub" id="homeShopSub">Nothing selected</p>
      </div>

<script>
(function () {
  "use strict";

  const KEY = "commandCentre.v3";
  const INBOX_KEY = "commandCentre.inbox";
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const $ = id => document.getElementById(id);

  const CATEGORIES = ["Fruit & Veg", "Bakery", "Meat & Fish", "Dairy & Cheese", "Pantry", "Drinks", "Other"];

  const SEED_VERSION = 3;
  const SEED = [
    ["Tomatoes - firm", "Fruit & Veg"],
    ["Cucumber", "Fruit & Veg"],
    ["Bell peppers", "Fruit & Veg"],
    ["Lemons", "Fruit & Veg"],
    ["Potatoes", "Fruit & Veg"],
    ["Sweet potatoes", "Fruit & Veg"],
    ["Red cabbage", "Fruit & Veg"],
    ["Red onions", "Fruit & Veg"],
    ["White onions", "Fruit & Veg"],
    ["Green onions", "Fruit & Veg"],
    ["Greens in a bag (mixed)", "Fruit & Veg"],
    ["Roszponka", "Fruit & Veg"],
    ["Blueberries", "Fruit & Veg"],
    ["Raspberries", "Fruit & Veg"],
    ["Strawberries", "Fruit & Veg"],
    ["Watermelon", "Fruit & Veg"],
    ["Chleb górski", "Bakery"],
    ["Chleb razowy ze słonecznikiem", "Bakery"],
    ["Tortillas", "Bakery"],
    ["Puff pastry", "Bakery"],
    ["Chicken breast fillet", "Meat & Fish"],
    ["Minced beef", "Meat & Fish"],
    ["Cottage Cheese light", "Dairy & Cheese"],
    ["Feta-like cheese (lower-fat)", "Dairy & Cheese"],
    ["Piórko", "Dairy & Cheese"],
    ["Twaróg półtłusty", "Dairy & Cheese"],
    ["Skyr", "Dairy & Cheese"],
    ["Łaciaty serek kremowy lekki Protein +", "Dairy & Cheese"],
    ["Eggs: free range", "Dairy & Cheese"],
    ["Eggs: L", "Dairy & Cheese"],
    ["Milk 3%", "Dairy & Cheese"],
    ["Milk 2%", "Dairy & Cheese"],
    ["Milk fresh", "Dairy & Cheese"],
    ["Śmietanka 30%", "Dairy & Cheese", "500 ml"],
    ["Mascarpone", "Dairy & Cheese", "500 ml"],
    ["Liliput cheese", "Dairy & Cheese"],
    ["Parmesan-like hard cheese", "Dairy & Cheese"],
    ["Halloumi", "Dairy & Cheese"],
    ["Mozarella block", "Dairy & Cheese"],
    ["Mozarella ball", "Dairy & Cheese"],
    ["Mozarella little balls", "Dairy & Cheese"],
    ["Olive oil", "Pantry"],
    ["Pasta", "Pantry"],
    ["Rice", "Pantry"],
    ["Passata", "Pantry"],
    ["Pineapple (cans)", "Pantry"],
    ["Corn (cans)", "Pantry"],
    ["Coke 0", "Drinks", "1 l"]
  ].map(([name, category, defaultQty]) => ({
    id: uid(), name, category, needed: false, brand: "",
    qty: defaultQty || "", defaultQty: defaultQty || ""
  }));

  // Generic ingredient names -> a specific catalog item (e.g. plain "milk" -> 2%).
  const ALIASES = { "milk": "Milk 2%", "mleko": "Milk 2%" };

  // Items that used to carry a size in the name; migrate the size into the quantity field.
  const NAME_FIXES = {
    "twang półtłusty": { name: "Twaróg półtłusty" },
    "coke 0 - 1l": { name: "Coke 0", qty: "1 l" },
    "śmietanka 30% 500ml": { name: "Śmietanka 30%", qty: "500 ml" },
    "mascarpone 500ml": { name: "Mascarpone", qty: "500 ml" }
  };

  const ICON = {
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>',
    chev: '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>',
    cart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2 3h3l2.6 13.4a2 2 0 0 0 2 1.6h8a2 2 0 0 0 2-1.6L23 6H6"></path></svg>',
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg>',
    empty: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>'
  };

  let state = load();
  migrateSeeds(state);
  const ingested = ingestFromURL();
  save(); // persist current schema / migration

  function seedCopy() { return SEED.map(s => ({ ...s, id: uid() })); }
  function ensureSeeds(s) {
    const have = new Set(s.catalog.map(c => c.name.trim().toLowerCase()));
    SEED.forEach(seed => {
      if (!have.has(seed.name.trim().toLowerCase())) s.catalog.push({ ...seed, id: uid() });
    });
  }
  // Add newly-shipped default items once, and self-heal old size-in-name items.
  function migrateSeeds(s) {
    s.catalog.forEach(c => {
      const fix = NAME_FIXES[(c.name || "").trim().toLowerCase()];
      if (fix) {
        c.name = fix.name;
        if (fix.qty) { c.defaultQty = c.defaultQty || fix.qty; if (!c.qty) c.qty = fix.qty; }
      }
    });
    if ((s.seedVersion || 0) < SEED_VERSION) { ensureSeeds(s); s.seedVersion = SEED_VERSION; }
  }

  // ----- quantity parsing / summing -----
  const fmtNum = n => (Math.round(n * 100) / 100).toString();
  // Known units -> family + factor to a base unit (volume base = ml, mass base = g).
  const UNITS = {
    ml: { f: "v", k: 1 }, milliliter: { f: "v", k: 1 }, millilitre: { f: "v", k: 1 },
    l: { f: "v", k: 1000 }, liter: { f: "v", k: 1000 }, litre: { f: "v", k: 1000 },
    g: { f: "m", k: 1 }, gram: { f: "m", k: 1 }, grams: { f: "m", k: 1 }, dag: { f: "m", k: 10 },
    kg: { f: "m", k: 1000 }, kilo: { f: "m", k: 1000 }, kilogram: { f: "m", k: 1000 }
  };
  function parseQty(str) {
    return String(str || "").split("+").map(t => t.trim()).filter(Boolean).map(term => {
      const m = term.match(/^([\d.,]+)\s*(.*)$/);
      if (!m) return { raw: term };
      return { value: parseFloat(m[1].replace(",", ".")), unit: (m[2] || "").trim() };
    });
  }
  // Sum quantities: convert within volume (ml/l) and mass (g/kg) families, sum identical
  // opaque units, and list anything mixed side by side. No cross-family conversion.
  function mergeQty(a, b) {
    const parts = [...parseQty(a), ...parseQty(b)];
    const fams = { v: 0, m: 0 };          // summed in base units
    const seen = { v: false, m: false };
    const others = new Map();             // exact-unit-string -> {sum, unit}
    const notes = [];
    parts.forEach(p => {
      if (p.raw || isNaN(p.value)) { if (p.raw) notes.push(p.raw); return; }
      const def = UNITS[p.unit.toLowerCase()];
      if (def) { fams[def.f] += p.value * def.k; seen[def.f] = true; }
      else {
        const key = p.unit.toLowerCase();
        const cur = others.get(key) || { sum: 0, unit: p.unit };
        cur.sum += p.value; others.set(key, cur);
      }
    });
    const out = [];
    if (seen.v) out.push(fams.v >= 1000 ? fmtNum(fams.v / 1000) + " l" : fmtNum(fams.v) + " ml");
    if (seen.m) out.push(fams.m >= 1000 ? fmtNum(fams.m / 1000) + " kg" : fmtNum(fams.m) + " g");
    others.forEach(v => out.push(fmtNum(v.sum) + (v.unit ? " " + v.unit : "")));
    notes.forEach(t => { if (!out.includes(t)) out.push(t); });
    return out.join(" + ");
  }
  function resolveName(name) {
    const key = String(name || "").trim().toLowerCase();
    return ALIASES[key] || name;
  }

  // Tick matching catalog items "needed" (summing quantity); add unknown ones under "Other".
  // Accepts strings ("Milk 2%") or objects ({ name, qty }). Returns count.
  function addItems(items) {
    let n = 0;
    items.forEach(raw => {
      const name = resolveName(String((raw && raw.name != null ? raw.name : raw)).trim());
      if (!name) return;
      const qty = raw && raw.qty != null ? String(raw.qty).trim() : "";
      const match = state.catalog.find(c => c.name.trim().toLowerCase() === name.toLowerCase());
      if (match) {
        match.needed = true;
        if (qty) match.qty = match.qty ? mergeQty(match.qty, qty) : qty;
      } else {
        state.catalog.push({ id: uid(), name, category: "Other", needed: true, brand: "", qty, defaultQty: "" });
      }
      n++;
    });
    return n;
  }

  // Handoff #1 — via a URL (works from any page). Optional quantity after "~":
  //   command-centre/?add=Milk%202%25~2%20l|Eggs:%20L|Butter~200%20g
  function ingestFromURL() {
    const raw = new URLSearchParams(location.search).get("add");
    if (!raw) return false;
    const items = raw.split(/[|\n]/).map(tok => {
      const [name, qty] = tok.split("~");
      return { name: (name || "").trim(), qty: (qty || "").trim() };
    }).filter(x => x.name);
    const added = addItems(items);
    // strip the query so a refresh doesn't re-add, and land on the shopping view
    history.replaceState(null, "", location.pathname + "#shop");
    return added > 0;
  }

  // Handoff #2 — via shared browser storage (same github.io account, no navigation):
  //   the recipe page writes localStorage["commandCentre.inbox"] = JSON.stringify([...names])
  function ingestInbox() {
    let raw;
    try { raw = localStorage.getItem(INBOX_KEY); } catch (e) { return; }
    if (!raw) return;
    try { localStorage.removeItem(INBOX_KEY); } catch (e) {}
    let items = [];
    try {
      const d = JSON.parse(raw);
      items = Array.isArray(d) ? d : [];
    } catch (e) { items = raw.split(/[|\n]/); }
    const added = addItems(items.filter(Boolean));
    if (!added) return;
    save(); renderShop();
    toast(added + " item" + (added === 1 ? "" : "s") + " added from recipe");
  }

  function toast(msg, action, sticky) {
    let t = $("toast");
    if (!t) { t = document.createElement("div"); t.id = "toast"; document.body.appendChild(t); }
    t.innerHTML = "";
    const span = document.createElement("span"); span.textContent = msg; t.appendChild(span);
    if (action) {
      const btn = document.createElement("button");
      btn.className = "toast-action"; btn.type = "button"; btn.textContent = action.label;
      btn.addEventListener("click", () => { action.fn(); if (!action.keepOpen) t.classList.remove("show"); });
      t.appendChild(btn);
    }
    t.classList.add("show");
    clearTimeout(t._hide);
    if (!sticky) t._hide = setTimeout(() => t.classList.remove("show"), action ? 6000 : 2800);
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) return normalize(JSON.parse(raw)); // current schema, no seed injection
      // migrate from v2 (catalog schema) and add any new default items
      const v2 = localStorage.getItem("commandCentre.v2");
      if (v2) { const s = normalize(JSON.parse(v2)); ensureSeeds(s); return s; }
      // migrate from v1 (free-text shopping list)
      const v1 = localStorage.getItem("commandCentre.v1");
      if (v1) {
        const p = JSON.parse(v1);
        const catalog = seedCopy();
        (p.shopping || []).forEach(x => {
          if (catalog.some(c => c.name.trim().toLowerCase() === (x.text || "").trim().toLowerCase())) return;
          catalog.push({ id: uid(), name: x.text, category: "Other", needed: !x.done, brand: "" });
        });
        return { todos: p.todos || [], catalog };
      }
    } catch (e) { console.warn("Load failed", e); }
    return { todos: [], catalog: seedCopy() };
  }

  function normalize(p) {
    const s = { todos: p.todos || [], catalog: p.catalog || [], seedVersion: p.seedVersion || 0 };
    if (!s.catalog.length && Array.isArray(p.shopping) && p.shopping.length) {
      s.catalog = seedCopy();
      p.shopping.forEach(x => s.catalog.push({ id: x.id || uid(), name: x.text, category: "Other", needed: !x.done, brand: "" }));
    }
    if (!s.catalog.length) s.catalog = seedCopy();
    s.catalog.forEach(c => {
      if (!c.id) c.id = uid();
      if (!c.category) c.category = "Other";
      if (typeof c.needed !== "boolean") c.needed = false;
      if (typeof c.brand !== "string") c.brand = "";
      if (typeof c.qty !== "string") c.qty = "";
      if (typeof c.defaultQty !== "string") c.defaultQty = "";
    });
    return s;
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); }
    catch (e) { console.warn("Save failed", e); }
  }

  // ---------- To-do ----------
  function fmtDue(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return "";
    const now = new Date();
    const opts = { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" };
    if (d.getFullYear() !== now.getFullYear()) opts.year = "numeric";
    return d.toLocaleString(undefined, opts);
  }
  function dueState(item) {
    if (!item.due || item.done) return null;
    const diff = new Date(item.due) - new Date();
    if (diff < 0) return "overdue";
    if (diff < 24 * 3600 * 1000) return "soon";
    return "due";
  }
  function makeTodo(item) {
    const li = document.createElement("li");
    li.className = "item" + (item.done ? " done" : "");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.className = "check"; cb.checked = !!item.done;
    cb.addEventListener("change", () => { item.done = cb.checked; save(); renderTodos(); });
    const body = document.createElement("div"); body.className = "item-body";
    const text = document.createElement("div"); text.className = "item-text"; text.textContent = item.text;
    body.appendChild(text);
    if (item.due) {
      const ds = dueState(item);
      const meta = document.createElement("div"); meta.className = "item-meta";
      meta.innerHTML = ICON.clock + " " + fmtDue(item.due);
      if (ds && ds !== "due") {
        const pill = document.createElement("span");
        pill.className = "pill " + ds;
        pill.textContent = ds === "overdue" ? "Overdue" : "Soon";
        meta.appendChild(pill);
      }
      body.appendChild(meta);
    }
    const del = document.createElement("button");
    del.className = "del"; del.type = "button"; del.title = "Delete"; del.innerHTML = ICON.trash;
    del.addEventListener("click", () => {
      li.style.opacity = "0"; li.style.transform = "translateX(10px)";
      setTimeout(() => { state.todos = state.todos.filter(t => t.id !== item.id); save(); renderTodos(); }, 150);
    });
    li.append(cb, body, del);
    return li;
  }
  function todoBucket(t) {
    if (t.done) return "done";
    if (!t.due) return "someday";
    const due = new Date(t.due), now = new Date();
    if (due < now) return "overdue";
    const endOfToday = new Date(); endOfToday.setHours(23, 59, 59, 999);
    if (due <= endOfToday) return "today";
    return "upcoming";
  }
  const TODO_SECTIONS = [
    ["overdue", "Overdue", "overdue"],
    ["today", "Today", "today"],
    ["upcoming", "Upcoming", ""],
    ["someday", "No date", ""],
    ["done", "Done", "muted"]
  ];
  function renderTodos() {
    const list = $("todoList"); list.innerHTML = "";
    if (!state.todos.length) {
      const li = document.createElement("li");
      li.innerHTML = '<div class="empty">' + ICON.empty + "<p>Nothing scheduled. Add your first task above.</p></div>";
      list.appendChild(li);
    } else {
      const buckets = {};
      state.todos.forEach(t => { (buckets[todoBucket(t)] = buckets[todoBucket(t)] || []).push(t); });
      const byDue = (a, b) => (a.due ? new Date(a.due) : Infinity) - (b.due ? new Date(b.due) : Infinity);
      TODO_SECTIONS.forEach(([key, label, mod]) => {
        const items = buckets[key];
        if (!items || !items.length) return;
        const head = document.createElement("li");
        head.className = "list-sec";
        head.innerHTML = '<div class="sec-title ' + mod + '"><span>' + label +
          '</span><span class="bar"></span><span class="n">' + items.length + "</span></div>";
        list.appendChild(head);
        items.sort(byDue).forEach(t => list.appendChild(makeTodo(t)));
      });
    }
    $("todoCount").textContent = state.todos.filter(t => !t.done).length;
    const total = state.todos.length, done = state.todos.filter(t => t.done).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    $("todoProgress").style.width = pct + "%";
    $("todoProgressLabel").textContent = total ? (done + " of " + total + " tasks done · " + pct + "%") : "Nothing yet";
    $("clearDoneTodo").hidden = !state.todos.some(t => t.done);
    updateHome();
  }

  // ---------- Shopping catalog ----------
  function catOrder(cat) {
    const i = CATEGORIES.indexOf(cat);
    return i === -1 ? CATEGORIES.length : i;
  }
  function makeCatItem(item) {
    const li = document.createElement("li");
    li.className = "cat-item" + (item.needed ? " needed" : "");

    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.className = "check"; cb.checked = !!item.needed;
    cb.addEventListener("change", e => {
      e.stopPropagation();
      item.needed = cb.checked;
      if (!cb.checked) item.qty = item.defaultQty || ""; // clear recipe quantities when ticked off
      save(); renderShop(); // ticked items float to the ready list on top
    });

    const name = document.createElement("div");
    name.className = "name";
    name.innerHTML = "<span class=\"nm\">" + escapeHtml(item.name) + "</span>" +
      (item.qty ? "<span class=\"qty-tag\">" + escapeHtml(item.qty) + "</span>" : "") + ICON.chev;
    name.addEventListener("click", () => li.classList.toggle("open"));

    const detail = document.createElement("div");
    detail.className = "detail";

    const qrow = document.createElement("div"); qrow.className = "row";
    const qlab = document.createElement("label"); qlab.textContent = "Quantity";
    const qinp = document.createElement("input");
    qinp.className = "brand-input"; qinp.type = "text";
    qinp.placeholder = "e.g. 2 l, 500 g…";
    qinp.value = item.qty || "";
    qinp.addEventListener("input", () => { item.qty = qinp.value; save(); syncQtyTag(); });
    qinp.addEventListener("click", e => e.stopPropagation());
    qrow.append(qlab, qinp);

    const row = document.createElement("div"); row.className = "row";
    const lab = document.createElement("label"); lab.textContent = "Brand / notes";
    const inp = document.createElement("input");
    inp.className = "brand-input"; inp.type = "text";
    inp.placeholder = "e.g. brand, aisle…";
    inp.value = item.brand || "";
    inp.addEventListener("input", () => { item.brand = inp.value; save(); });
    inp.addEventListener("click", e => e.stopPropagation());
    const rm = document.createElement("button");
    rm.className = "remove-perm"; rm.type = "button";
    rm.innerHTML = ICON.trash + " Remove permanently";
    rm.addEventListener("click", () => {
      const idx = state.catalog.findIndex(c => c.id === item.id);
      if (idx === -1) return;
      const [removed] = state.catalog.splice(idx, 1);
      save(); renderShop();
      toast('Removed "' + removed.name + '"', {
        label: "Undo",
        fn: () => { state.catalog.splice(Math.min(idx, state.catalog.length), 0, removed); save(); renderShop(); }
      });
    });
    row.append(lab, inp, rm);
    const tag = document.createElement("div"); tag.className = "cat-tag";
    tag.textContent = "Category: " + item.category;
    detail.append(qrow, row, tag);

    // keep the collapsed qty pill in sync while editing, without a full re-render
    function syncQtyTag() {
      let pill = name.querySelector(".qty-tag");
      if (item.qty) {
        if (!pill) { pill = document.createElement("span"); pill.className = "qty-tag"; name.insertBefore(pill, name.querySelector(".chev")); }
        pill.textContent = item.qty;
      } else if (pill) { pill.remove(); }
    }

    li.append(cb, name, detail);
    return li;
  }
  function appendGroups(list, items) {
    const groups = {};
    items.forEach(it => { (groups[it.category] = groups[it.category] || []).push(it); });
    Object.keys(groups)
      .sort((a, b) => catOrder(a) - catOrder(b) || a.localeCompare(b))
      .forEach(cat => {
        const its = groups[cat];
        const head = document.createElement("li");
        head.className = "cat-group";
        head.innerHTML = '<div class="cat-title"><span>' + escapeHtml(cat) +
          '</span><span class="bar"></span><span class="n">' + its.length + "</span></div>";
        list.appendChild(head);
        its.slice().sort((a, b) => a.name.localeCompare(b.name)).forEach(it => list.appendChild(makeCatItem(it)));
      });
  }
  function sectionHead(cls, iconSvg, label, n) {
    const li = document.createElement("li");
    li.className = "section";
    li.innerHTML = '<div class="section-head ' + cls + '">' + iconSvg +
      "<span>" + label + "</span><span class=\"sh-n\">" + n + "</span></div>";
    return li;
  }
  function renderShop() {
    const list = $("shopList"); list.innerHTML = "";
    if (!state.catalog.length) {
      const li = document.createElement("li");
      li.innerHTML = '<div class="empty">' + ICON.empty + "<p>No items yet. Add your own above.</p></div>";
      list.appendChild(li);
      updateShopMeta(); return;
    }
    const needed = state.catalog.filter(c => c.needed);
    const rest = state.catalog.filter(c => !c.needed);
    if (needed.length) {
      list.appendChild(sectionHead("ready", ICON.cart, "Ready list", needed.length));
      appendGroups(list, needed);
      list.appendChild(sectionHead("rest", ICON.list, "Everything else", rest.length));
    }
    appendGroups(list, rest);
    updateShopMeta();
  }
  function updateShopMeta() {
    const total = state.catalog.length;
    const need = state.catalog.filter(c => c.needed).length;
    $("shopCount").textContent = need;
    const pct = total ? Math.round(need / total * 100) : 0;
    $("shopProgress").style.width = pct + "%";
    $("shopProgressLabel").textContent = need ? (need + " item" + (need === 1 ? "" : "s") + " to buy") : "Nothing selected";
    $("clearShop").hidden = !need;
    updateHome();
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // populate category dropdown
  CATEGORIES.forEach(c => {
    const o = document.createElement("option"); o.value = c; o.textContent = c;
    if (c === "Other") o.selected = true;
    $("shopCat").appendChild(o);
  });

  // ---------- forms ----------
  $("todoForm").addEventListener("submit", e => {
    e.preventDefault();
    const text = $("todoText").value.trim(); if (!text) return;
    const due = $("todoDue").value || null;
    state.todos.push({ id: uid(), text, due, done: false });
    save(); renderTodos(); e.target.reset(); $("todoText").focus();
  });
  $("shopForm").addEventListener("submit", e => {
    e.preventDefault();
    const name = $("shopText").value.trim(); if (!name) return;
    const category = $("shopCat").value || "Other";
    const qty = $("shopQty").value.trim();
    const match = state.catalog.find(c => c.name.trim().toLowerCase() === resolveName(name).toLowerCase());
    if (match) { match.needed = true; if (qty) match.qty = match.qty ? mergeQty(match.qty, qty) : qty; }
    else state.catalog.push({ id: uid(), name, category, needed: true, brand: "", qty, defaultQty: "" });
    save(); renderShop(); e.target.reset(); $("shopCat").value = "Other"; $("shopText").focus();
  });
  $("clearDoneTodo").addEventListener("click", () => {
    state.todos = state.todos.filter(t => !t.done); save(); renderTodos();
  });
  $("clearShop").addEventListener("click", () => {
    state.catalog.forEach(c => { c.needed = false; c.qty = c.defaultQty || ""; }); save(); renderShop();
  });

  // ---------- export / import ----------
  $("exportBtn").addEventListener("click", () => {
    const payload = { version: 2, exportedAt: new Date().toISOString(), ...state };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "command-centre-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click(); URL.revokeObjectURL(url);
  });
  $("importBtn").addEventListener("click", () => $("fileInput").click());
  $("fileInput").addEventListener("change", e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const hasData = Array.isArray(data.todos) || Array.isArray(data.catalog) || Array.isArray(data.shopping);
        if (!hasData) throw new Error("Unrecognised file");
        const incoming = normalize(data);
        const merge = confirm("OK = merge with current data.\nCancel = replace everything with the file.");
        if (merge) {
          const ids = new Set(state.todos.map(t => t.id).concat(state.catalog.map(c => c.id)));
          incoming.todos.forEach(t => { if (!ids.has(t.id)) state.todos.push(t); });
          incoming.catalog.forEach(c => { if (!ids.has(c.id)) state.catalog.push(c); });
        } else {
          state = incoming;
        }
        save(); renderTodos(); renderShop();
      } catch (err) { alert("Could not import: " + err.message); }
      e.target.value = "";
    };
    reader.readAsText(file);
  });

  // ---------- home tiles + view routing ----------
  const VIEWS = { home: "Your day at a glance", todo: "To-do & schedule", shop: "Shopping list" };
  function updateHome() {
    const open = state.todos.filter(t => !t.done).length;
    const overdue = state.todos.filter(t => t.due && !t.done && new Date(t.due) < new Date()).length;
    $("homeTodoSub").textContent = open
      ? open + " task" + (open === 1 ? "" : "s") + " open" + (overdue ? " · " + overdue + " overdue" : "")
      : "All clear";
    const need = state.catalog.filter(c => c.needed).length;
    $("homeShopSub").textContent = need ? need + " item" + (need === 1 ? "" : "s") + " to buy" : "Nothing selected";
  }
  function route() {
    let h = (location.hash || "").replace("#", "");
    if (!(h in VIEWS)) h = "home";
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    const el = $("view-" + h);
    if (el) el.classList.add("active");
    $("backBtn").hidden = (h === "home");
    $("brandSub").textContent = VIEWS[h];
    window.scrollTo({ top: 0 });
    if (h === "todo") $("todoText").focus();
    if (h === "shop") $("shopText").focus();
  }
  window.addEventListener("hashchange", route);

  // Live inbox handoff: pick up items written by the recipe page while this is open,
  // and re-check when the tab regains focus.
  window.addEventListener("storage", e => { if (e.key === INBOX_KEY && e.newValue) ingestInbox(); });
  document.addEventListener("visibilitychange", () => { if (!document.hidden) ingestInbox(); });

  renderTodos();
  renderShop();
  route();
  ingestInbox();

  // ---------- PWA: install prompt + service worker ----------
  let deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault(); deferredPrompt = e; $("installBtn").hidden = false;
  });
  $("installBtn").addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null; $("installBtn").hidden = true;
  });
  window.addEventListener("appinstalled", () => { $("installBtn").hidden = true; });

  function promptUpdate(worker) {
    toast("Update available", { label: "Refresh", keepOpen: true, fn: () => worker.postMessage({ type: "SKIP_WAITING" }) }, true);
  }
  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    let reloading = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloading) return; reloading = true; location.reload();
    });
    window.addEventListener("load", async () => {
      try {
        const reg = await navigator.serviceWorker.register("sw.js");
        // a new version was already downloaded on a previous visit
        if (reg.waiting && navigator.serviceWorker.controller) promptUpdate(reg.waiting);
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener("statechange", () => {
            // "installed" + an existing controller means this is an update, not first install
            if (nw.state === "installed" && navigator.serviceWorker.controller) promptUpdate(nw);
          });
        });
      } catch (e) {}
    });
  }
})();
</script>
</body>
</html>
